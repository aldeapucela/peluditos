name: Actualizar publicaciones

on:
  schedule:
    - cron: '0 9 * * *'   # cada día a las 09:00 UTC (tras el reset de cuota de Gemini: 07:00-08:00 UTC / medianoche Pacífico)
  workflow_dispatch:       # permite lanzarlo a mano

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sincronizar publicaciones
        env:
          IG_API_TOKEN: ${{ secrets.IG_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # clave de pago (prepago, nivel 1)
          CLASSIFY_FAST: '1'                               # sin freno de 7s: la clave de pago admite alto ritmo
        run: node scripts/fetch.mjs
      - name: Publicar cambios
        run: |
          git config user.name "peluditos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/posts.json data/archive img
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar publicaciones ($(date -u +%F))"
            git pull --rebase origin main || true
            git push
          fi

  # El push del job anterior usa GITHUB_TOKEN y NO dispara deploy-pages.yml (regla
  # anti-recursión de GitHub). Por eso desplegamos aquí mismo, en la misma tanda.
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # el commit recién publicado por el job update
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
