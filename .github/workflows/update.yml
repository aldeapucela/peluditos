name: Actualizar publicaciones

on:
  schedule:
    - cron: '0 9 * * *'   # cada día a las 09:00 UTC (tras el reset de cuota de Gemini: 07:00-08:00 UTC / medianoche Pacífico)
  workflow_dispatch:       # permite lanzarlo a mano
    inputs:
      gemini:
        description: 'Clave de Gemini (free = gratuita con límites; paid = de pago sin frenos, para backfill)'
        type: choice
        options: [free, paid]
        default: free

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sincronizar publicaciones
        env:
          IG_API_TOKEN: ${{ secrets.IG_API_TOKEN }}
          # 'paid' (dispatch manual) usa la clave sin límites; cron y uso normal usan la gratuita.
          GEMINI_API_KEY: ${{ github.event.inputs.gemini == 'paid' && secrets.GEMINI_API_KEY_2 || secrets.GEMINI_API_KEY }}
          CLASSIFY_FAST: ${{ github.event.inputs.gemini == 'paid' && '1' || '' }}
        run: node scripts/fetch.mjs
      - name: Publicar cambios
        run: |
          git config user.name "peluditos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/posts.json img
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar publicaciones ($(date -u +%F))"
            git push
          fi
