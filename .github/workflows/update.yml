name: Actualizar publicaciones

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 07:00 Madrid; con el retraso típico de GitHub (2-3h) queda listo hacia las ~10:00 Madrid. Gemini es de pago → ya no aplica el reset de cuota gratuita que obligaba a las 09:00 UTC.
  workflow_dispatch:       # permite lanzarlo a mano (vacío = comportamiento normal del cron)
    inputs:
      only_users:
        description: 'Backfill solo estas cuentas (coma-separadas). Vacío = todas.'
        default: ''
      ingest_max_days:
        description: 'Días hacia atrás a ingerir (normal: 2).'
        default: ''
      posts_per_account:
        description: 'Posts a pedir por cuenta (normal: 6).'
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sincronizar publicaciones
        env:
          IG_API_TOKEN: ${{ secrets.IG_API_TOKEN }}
          IG_API_TOKEN_2: ${{ secrets.IG_API_TOKEN_2 }}   # 2ª cuenta Apify (failover al agotarse el free de la 1ª)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # clave de pago (prepago, nivel 1)
          CLASSIFY_FAST: '1'                               # sin freno de 7s: la clave de pago admite alto ritmo
          ONLY_USERS: ${{ github.event.inputs.only_users }}          # vacío en cron → todas
          INGEST_MAX_DAYS: ${{ github.event.inputs.ingest_max_days }} # vacío en cron → 2
          POSTS_PER_ACCOUNT: ${{ github.event.inputs.posts_per_account }} # vacío en cron → 6
        run: node scripts/fetch.mjs
      - name: Publicar cambios
        run: |
          git config user.name "peluditos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/posts.json data/archive img
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar publicaciones ($(date -u +%F))"
            git pull --rebase origin main || true
            git push
          fi

  # El push del job anterior usa GITHUB_TOKEN y NO dispara deploy-pages.yml (regla
  # anti-recursión de GitHub). Por eso desplegamos aquí mismo, en la misma tanda.
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # el commit recién publicado por el job update
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # El backend de Pages falla a veces ("Deployment failed, try again later") pese a sus
      # 10 reintentos internos. Reintentamos el deploy a nivel de workflow hasta 3 veces;
      # solo la última llamada puede tumbar el job (si Pages está caído de verdad).
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 90
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
